# Phase-3 breadth run (plan.md run #7): the winning K=8 multi-source recipe on
# all 74 shareable full Bibles (one per language, 15 families; ~2.3M pairs),
# vs the 31-language IE selection. Tests whether 2–3x language breadth lifts
# fusion and held-out OT quality. Publishable (all sources PD/by-sa -> the
# propagated model licence is cc-by-sa-4.0).
name: allbibles_ms8
phase: multi-source

data:
  selection: experiments/selection-allbibles.csv
  holdouts: configs/holdouts-allbibles.yaml
  source: greek
  pairing: multi-source
  k: 8
  k_min: 1
  max_len: 192
  max_src_len: 640
  max_ratio: 0

tokenizer:
  type: bpe
  vocab_size: 32000

model:                    # transformer-big (~210M)
  arch: marian
  encoder_layers: 6
  decoder_layers: 6
  d_model: 1024
  encoder_attention_heads: 16
  decoder_attention_heads: 16
  encoder_ffn_dim: 4096
  decoder_ffn_dim: 4096
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 4000
  lr_scheduler: cosine
  per_device_batch_size: 32
  gradient_accumulation: 8
  max_grad_norm: 1.0
  bf16: true
  max_steps: 120000             # a touch longer: 74 langs, ~3x the pairs
  eval_every_steps: 2000
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 192

probe:
  every_steps: 1000
  verses_per_language: 250
  min_gain: 1.0
  patience_steps: 20000
  batch_size: 32
  seed: 13

oversample_holdouts: 1

# Attach base (plan.md run #3), K=8 variant — launched alongside the K=4 base
# while the jobs_backlog queue is idle, so the winning-K base is ready whichever
# way the ms4-vs-ms8 comparison lands. Identical to ms8_ie_shareable but Dutch
# is removed from the selection (31 translations), standard three holdouts.
name: base_no_nld_ms8
phase: multi-source

data:
  selection: experiments/selection-ie-shareable-no-nld.csv
  holdouts: configs/holdouts-no-nld.yaml
  source: greek
  pairing: multi-source
  k: 8
  k_min: 1
  max_len: 192
  max_src_len: 640
  max_ratio: 0

tokenizer:
  type: bpe
  vocab_size: 32000

model:                    # transformer-big (~210M)
  arch: marian
  encoder_layers: 6
  decoder_layers: 6
  d_model: 1024
  encoder_attention_heads: 16
  decoder_attention_heads: 16
  encoder_ffn_dim: 4096
  decoder_ffn_dim: 4096
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 4000
  lr_scheduler: cosine
  per_device_batch_size: 32
  gradient_accumulation: 8
  max_grad_norm: 1.0
  bf16: true
  max_steps: 100000
  eval_every_steps: 2000
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 192

probe:
  every_steps: 1000
  verses_per_language: 250
  min_gain: 1.0
  patience_steps: 20000
  batch_size: 32
  seed: 13

oversample_holdouts: 1

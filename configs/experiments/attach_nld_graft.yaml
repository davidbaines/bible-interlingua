# Attach control (plan.md run #5): graft Dutch onto the frozen base_no_nld_ms
# model via one new target-tag embedding row + decoder adapters, trained on
# Dutch NT only. The attach lower bound — what a cheap adapter graft achieves
# before the interlingual anchor decoder is tried. Base run and K are filled in
# once the phase-1 winner is confirmed (base_no_nld_ms4 or _ms8).
name: attach_nld_graft
phase: attach

data:
  selection: experiments/selection-ie-shareable-no-nld.csv
  holdouts: configs/holdouts-no-nld.yaml

model:
  arch: marian

training:
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 192

attach:
  mode: graft
  base_run: checkpoints/base_no_nld_ms4
  translation: nld1939
  nt_dev_size: 500
  adapter_dim: 64
  lr: 1.0e-4
  max_steps: 20000
